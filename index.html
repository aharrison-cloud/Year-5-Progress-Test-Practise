<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Year 5 Science — Adaptive Practice (Gemini AI)</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1a2e;--ink2:#4a4a6a;--ink3:#8888aa;--ink4:#c0c0d8;
  --paper:#f0f4ff;--surface:#ffffff;--border:#dde2f0;--border2:#bec5e0;
  --bio:#166534;--bio-bg:#dcfce7;--bio-mid:#22c55e;
  --chem:#1e40af;--chem-bg:#dbeafe;--chem-mid:#3b82f6;
  --phys:#92400e;--phys-bg:#fef3c7;--phys-mid:#f59e0b;
  --ws:#5b21b6;--ws-bg:#ede9fe;--ws-mid:#8b5cf6;
  --exc-bg:#d1fae5;--exc-txt:#065f46;--ep-bg:#dbeafe;--ep-txt:#1e40af;
  --ex-bg:#f1f5f9;--ex-txt:#334155;--em-bg:#fef3c7;--em-txt:#92400e;
  --er-bg:#fee2e2;--er-txt:#991b1b;--r:12px;--rl:18px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
#s-login{align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0c29 0%,#1a1a4e 50%,#24243e 100%);position:relative;overflow:hidden}
.stars-bg{position:absolute;inset:0;pointer-events:none}
.star-dot{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d) ease-in-out infinite var(--dl)}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.9}}
.login-card{background:var(--surface);border-radius:24px;padding:2.2rem 2rem;width:min(420px,92vw);box-shadow:0 32px 80px rgba(0,0,0,.5);position:relative;z-index:1}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.logo-rocket{font-size:28px}
.logo-name{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:var(--ink)}
.logo-sub{font-size:11px;color:var(--ink3)}
.login-card h1{font-family:'Nunito',sans-serif;font-size:21px;font-weight:800;letter-spacing:-.5px;margin-bottom:.3rem}
.field{margin-bottom:.85rem}
.field label{display:block;font-size:11px;font-weight:600;color:var(--ink2);margin-bottom:5px;text-transform:uppercase}
.field input, .field select{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--paper)}
.btn-start{width:100%;padding:12px;background:linear-gradient(135deg,#1a1a4e,#0f3460);color:white;border:none;border-radius:var(--r);font-size:14px;font-weight:800;cursor:pointer}
.qhdr{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.qhdr-name{font-size:13px;font-weight:600;flex:1}
.prog-track{height:5px;background:var(--border);border-radius:3px;width:100px;overflow:hidden}
.prog-fill{height:100%;background:#1a1a4e;transition:width .4s}
.qbody{flex:1;padding:1.2rem 1.1rem;max-width:660px;margin:0 auto;width:100%}
.dom-badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:.6rem}
.db-bio{background:var(--bio-bg);color:var(--bio)}
.db-chem{background:var(--chem-bg);color:var(--chem)}
.db-phys{background:var(--phys-bg);color:var(--phys)}
.db-ws{background:var(--ws-bg);color:var(--ws)}
.q-text{font-size:16px;font-weight:700;margin-bottom:1rem}
.opt{display:flex;align-items:center;gap:11px;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;margin-bottom:8px;background:white}
.opt.correct{border-color:#16a34a;background:#f0fdf4}
.opt.wrong{border-color:#dc2626;background:#fef2f2}
.res-hero{background:#0f0c29;color:white;padding:2rem 1rem;text-align:center}
.rh-score-big{font-size:48px;font-weight:800}
.dom-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
.dom-card{background:white;border:1px solid var(--border);padding:15px;border-radius:12px;border-top:4px solid var(--ink)}
.ai-loading{display:none;padding:20px;text-align:center}
.ai-loading.show{display:block}
</style>
</head>
<body>

<div id="s-login" class="screen active">
    <div class="stars-bg" id="stars"></div>
    <div class="login-card">
        <div class="login-logo"><div class="logo-rocket">🚀</div><div><div class="logo-name">Year 5 Science</div><div class="logo-sub">NLCS Jeju</div></div></div>
        <h1>Practice Mode</h1>
        <div class="field"><label>Name</label><input type="text" id="inp-name" /></div>
        <div class="field"><label>Class</label><select id="inp-class"><option>5A</option><option>5B</option><option>5C</option><option>5D</option></select></div>
        <div class="field"><label>Topic</label><select id="inp-domain"><option value="all">All</option><option>Biology</option><option>Chemistry</option><option>Physics</option></select></div>
        <button class="btn-start" onclick="startQuiz()">Start 🚀</button>
    </div>
</div>

<div id="s-quiz" class="screen">
    <div class="qhdr">
        <div class="qhdr-name" id="hdr-name"></div>
        <div class="prog-track"><div class="prog-fill" id="prog" style="width:0%"></div></div>
        <button style="border:none;background:none;color:red;font-size:11px" onclick="stopAndFinish()">Finish</button>
    </div>
    <div class="qbody" id="qbody"></div>
</div>

<div id="s-results" class="screen">
    <div class="res-hero">
        <div id="rh-name"></div>
        <div class="rh-score-big" id="rh-score">0/0</div>
        <div id="rh-pct"></div>
    </div>
    <div class="res-body">
        <div class="dom-grid" id="rd-domains"></div>
        <div id="rd-review" style="margin-top:20px"></div>
        <button class="btn-start" style="margin-top:20px" onclick="location.reload()">Try Again</button>
    </div>
</div>

<script>
window.GEMINI_API_KEY = 'AIzaSyDQ44QdbO9wWHXPAHyF6F3OLLUAxLs4poo';
let quiz = { name:'', cls:'', domain:'all', qIdx:0, score:0, history:[], currentQ:null, locked:false };

function startQuiz() {
    quiz.name = document.getElementById('inp-name').value;
    if(!quiz.name) return alert("Enter name");
    document.getElementById('s-login').classList.remove('active');
    document.getElementById('s-quiz').classList.add('active');
    document.getElementById('hdr-name').innerText = quiz.name;
    loadNext();
}

async function loadNext() {
    quiz.qIdx++;
    quiz.locked = false;
    document.getElementById('prog').style.width = (quiz.qIdx * 10) + '%';
    const container = document.getElementById('qbody');
    container.innerHTML = `<div class="ai-loading show">AI is thinking...</div>`;
    
    try {
        const q = await fetchAIQuestion();
        renderQuestion(q);
    } catch (e) {
        container.innerHTML = `<p style="color:red">API Busy. <button onclick="loadNext()">Retry</button></p>`;
    }
}

async function fetchAIQuestion() {
    // FIXED URL
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${window.GEMINI_API_KEY}`;
    const prompt = `Return ONLY a raw JSON object for a Year 5 Science question on ${quiz.domain}. Structure: {"d":"Biology|Chemistry|Physics","q":"text","o":["A","B","C","D"],"a":0,"e":"explanation"}`;

    const resp = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
    });
    const data = await resp.json();
    return JSON.parse(data.candidates[0].content.parts[0].text);
}

function renderQuestion(q) {
    quiz.currentQ = q;
    const dClass = q.d.includes('Bio')?'db-bio':q.d.includes('Chem')?'db-chem':'db-phys';
    document.getElementById('qbody').innerHTML = `
        <div class="dom-badge ${dClass}">${q.d}</div>
        <div class="q-text">${q.q}</div>
        <div class="opts">
            ${q.o.map((opt, i) => `<div class="opt" onclick="checkAnswer(${i})">${opt}</div>`).join('')}
        </div>
        <div id="fb" style="display:none;margin-top:15px;padding:10px;border-radius:8px"></div>
        <button id="nb" class="btn-start" style="display:none;margin-top:15px" onclick="loadNext()">Next Question</button>
    `;
}

function checkAnswer(idx) {
    if(quiz.locked) return;
    quiz.locked = true;
    const isCorrect = idx === quiz.currentQ.a;
    if(isCorrect) quiz.score++;
    quiz.history.push({...quiz.currentQ, correct: isCorrect});
    
    const opts = document.querySelectorAll('.opt');
    opts[idx].classList.add(isCorrect ? 'correct' : 'wrong');
    opts[quiz.currentQ.a].classList.add('correct');
    
    const fb = document.getElementById('fb');
    fb.style.display = 'block';
    fb.style.background = isCorrect ? '#f0fdf4' : '#fef2f2';
    fb.innerText = quiz.currentQ.e;
    document.getElementById('nb').style.display = 'block';
}

function stopAndFinish() {
    document.getElementById('s-quiz').classList.remove('active');
    document.getElementById('s-results').classList.add('active');
    document.getElementById('rh-score').innerText = `${quiz.score}/${quiz.history.length}`;
    
    const domGrid = document.getElementById('rd-domains');
    domGrid.innerHTML = '';
    ['Biology', 'Chemistry', 'Physics'].forEach(d => {
        const dQs = quiz.history.filter(h => h.d === d);
        if(dQs.length > 0) {
            const correct = dQs.filter(h => h.correct).length;
            domGrid.innerHTML += `<div class="dom-card"><strong>${d}</strong><br>${correct}/${dQs.length}</div>`;
        }
    });

    const review = document.getElementById('rd-review');
    review.innerHTML = '<h3>Review Missed:</h3>' + quiz.history.filter(h => !h.correct).map(m => `<p>❌ ${m.q}<br><small>Correct: ${m.o[m.a]}</small></p>`).join('');
}

// Background stars
const starsCont = document.getElementById('stars');
for(let i=0; i<30; i++) {
    const s = document.createElement('div');
    s.className = 'star-dot';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.width = s.style.height = '2px';
    s.style.setProperty('--d', (Math.random()*3+2)+'s');
    s.style.setProperty('--dl', (Math.random()*5)+'s');
    starsCont.appendChild(s);
}
</script>
</body>
</html>
