<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year 5 Science - NLCS Jeju</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p:#1a1a4e; --s:#f0f4ff; --w:#ffffff; --r:12px; }
        body { font-family: 'Nunito', sans-serif; background: var(--s); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: var(--w); padding: 2rem; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dde2f0; border-radius: var(--r); font-size: 16px; box-sizing: border-box; }
        button { background: var(--p); color: white; border: none; padding: 14px; border-radius: var(--r); font-weight: 800; cursor: pointer; width: 100%; }
        #quiz-screen { display: none; width: 90%; max-width: 600px; background: white; padding: 2rem; border-radius: 24px; }
        .opt { border: 2px solid #dde2f0; padding: 15px; border-radius: var(--r); margin: 10px 0; cursor: pointer; text-align: left; }
        .correct { border-color: #22c55e; background: #dcfce7; }
        .wrong { border-color: #ef4444; background: #fee2e2; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h2 style="margin-top:0">🚀 Year 5 Science</h2>
        <input type="text" id="u-name" placeholder="Enter Name">
        <select id="u-class">
            <option value="">Select Class</option>
            <option>5A</option><option>5B</option><option>5C</option><option>5D</option><option>5E</option>
        </select>
        <button onclick="startApp()">Start Practice</button>
    </div>

    <div id="quiz-screen">
        <div id="q-content">
            <h3>Loading AI Question...</h3>
        </div>
    </div>

<script>
    // YOUR NEW KEY
    const KEY = 'AIzaSyDFT2a5BMzlpRNKOEIKtsMHK2vu8P6KYAU'; 

    function startApp() {
        const name = document.getElementById('u-name').value;
        const cls = document.getElementById('u-class').value;
        
        if(!name || !cls) return alert("Please fill in your name and class!");

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        fetchQuestion();
    }

    async function fetchQuestion() {
        const container = document.getElementById('q-content');
        container.innerHTML = "<h3>Generating Question...</h3>";

        try {
            // Updated to the most stable v1 endpoint to prevent 404s
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Provide a Year 5 Science question in JSON format: {\"q\":\"question\",\"o\":[\"A\",\"B\",\"C\",\"D\"],\"a\":0,\"e\":\"explanation\"}" }] }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });

            if(!response.ok) throw new Error("API Error: " + response.status);

            const data = await response.json();
            const q = JSON.parse(data.candidates[0].content.parts[0].text);
            
            container.innerHTML = `
                <h2>${q.q}</h2>
                ${q.o.map((opt, i) => `<div class="opt" onclick="check(${i}, ${q.a}, this, '${q.e.replace(/'/g, "\\'")}')">${opt}</div>`).join('')}
                <div id="feedback" style="margin-top:20px; font-weight:700; display:none"></div>
                <button id="next-btn" style="display:none; margin-top:20px" onclick="fetchQuestion()">Next Question</button>
            `;
        } catch (err) {
            container.innerHTML = `<h3 style="color:red">Error: ${err.message}</h3><button onclick="fetchQuestion()">Retry</button>`;
        }
    }

    function check(idx, correct, el, explain) {
        const opts = document.querySelectorAll('.opt');
        opts.forEach(o => o.style.pointerEvents = 'none');
        
        if(idx === correct) {
            el.classList.add('correct');
        } else {
            el.classList.add('wrong');
            opts[correct].classList.add('correct');
        }
        
        const fb = document.getElementById('feedback');
        fb.style.display = 'block';
        fb.innerText = explain;
        document.getElementById('next-btn').style.display = 'block';
    }
</script>
</body>
</html>
