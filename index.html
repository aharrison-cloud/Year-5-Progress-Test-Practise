<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year 5 Science — Adaptive Practice</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root{
            --ink:#1a1a2e;--ink2:#4a4a6a;--ink3:#8888aa;--ink4:#c0c0d8;
            --paper:#f0f4ff;--surface:#ffffff;--border:#dde2f0;--border2:#bec5e0;
            --chem:#1e40af;--chem-bg:#dbeafe;--r:12px;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Nunito Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
        .screen{display:none;min-height:100vh;flex-direction:column}
        .screen.active{display:flex}
        #s-login{align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0c29 0%,#1a1a4e 100%)}
        .login-card{background:var(--surface);border-radius:24px;padding:2rem;width:min(420px,92vw);box-shadow:0 32px 80px rgba(0,0,0,.5)}
        .field{margin-bottom:.85rem}
        .field label{display:block;font-size:11px;font-weight:600;margin-bottom:5px;text-transform:uppercase}
        .field input,.field select{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px}
        .btn-start{width:100%;padding:12px;background:#0f3460;color:white;border:none;border-radius:var(--r);font-weight:800;cursor:pointer}
        .qhdr{background:var(--surface);border-bottom:1px solid var(--border);padding:.8rem;display:flex;align-items:center;gap:15px;position:sticky;top:0;z-index:100}
        .prog-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
        .prog-fill{height:100%;background:#1a1a4e;transition:width .4s}
        .qbody{flex:1;padding:1.5rem;max-width:660px;margin:0 auto;width:100%}
        .dom-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--chem-bg);color:var(--chem);margin-bottom:10px}
        .q-text{font-size:18px;font-weight:700;margin-bottom:1.5rem}
        .opts{display:flex;flex-direction:column;gap:10px}
        .opt{display:flex;align-items:center;gap:12px;padding:12px;border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;background:white}
        .opt.correct{border-color:#16a34a;background:#f0fdf4}
        .opt.wrong{border-color:#dc2626;background:#fef2f2}
        .fb{margin-top:1rem;padding:12px;border-radius:var(--r);display:none;font-size:14px}
        .fb.show{display:block}
        .ai-loading{display:none;padding:2rem;text-align:center}
        .ai-loading.show{display:block}
        .res-hero{background:#1a1a4e;color:white;padding:3rem;text-align:center}
    </style>
</head>
<body>

<div id="s-login" class="screen active">
    <div class="login-card">
        <h1>Year 5 Science</h1>
        <div class="field"><label>Name</label><input type="text" id="inp-name" placeholder="Full Name"></div>
        <div class="field">
            <label>Class</label>
            <select id="inp-class">
                <option value="">Select Class...</option>
                <option value="5A">5A</option>
                <option value="5B">5B</option>
                <option value="5C">5C</option>
                <option value="5D">5D</option>
                <option value="5E">5E</option>
            </select>
        </div>
        <div class="field">
            <label>Focus Topic</label>
            <select id="inp-domain">
                <option value="all">All Topics</option>
                <option value="Biology">Biology</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Physics">Physics</option>
            </select>
        </div>
        <button class="btn-start" onclick="startQuiz()">Start Quiz</button>
    </div>
</div>

<div id="s-quiz" class="screen">
    <div class="qhdr">
        <div id="hdr-count" style="font-weight:bold">Q1</div>
        <div class="prog-track"><div class="prog-fill" id="prog" style="width:0%"></div></div>
        <button onclick="finishQuiz()" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold">Finish</button>
    </div>
    <div id="qbody" class="qbody">
        <div class="ai-loading show" id="load-box">AI is generating your question...</div>
    </div>
</div>

<div id="s-results" class="screen">
    <div class="res-hero">
        <h2 id="res-name"></h2>
        <div style="font-size:48px; font-weight:800" id="res-score">0/0</div>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; border-radius:12px; cursor:pointer">Try Again</button>
    </div>
</div>

<script>
window.GEMINI_API_KEY = 'AIzaSyDQ44QdbO9wWHXPAHyF6F3OLLUAxLs4poo';

let state = { name: '', cl: '', domain: 'all', qIdx: 0, score: 0, currentQ: null, locked: false };

const FALLBACK = [
    {d:'Biology', q:'What part of a plant absorbs water?', o:['Leaves','Flowers','Roots','Stem'], a:2, e:'Roots absorb water and nutrients from the soil.'},
    {d:'Physics', q:'Which force pulls objects toward the Earth?', o:['Friction','Gravity','Magnetism','Air Resistance'], a:1, e:'Gravity is the force that pulls everything toward the center of the Earth.'},
    {d:'Chemistry', q:'Which of these is a reversible change?', o:['Burning wood','Melting ice','Cooking an egg','Baking bread'], a:1, e:'Melting is reversible because you can freeze the water back into ice.'}
];

function startQuiz() {
    state.name = document.getElementById('inp-name').value;
    state.cl = document.getElementById('inp-class').value;
    state.domain = document.getElementById('inp-domain').value;
    if(!state.name || !state.cl) return alert("Please enter your name and select your class!");
    document.getElementById('s-login').classList.remove('active');
    document.getElementById('s-quiz').classList.add('active');
    loadNextQuestion();
}

async function loadNextQuestion() {
    state.qIdx++;
    state.locked = false;
    document.getElementById('hdr-count').innerText = `Q${state.qIdx}`;
    document.getElementById('prog').style.width = Math.min((state.qIdx * 10), 100) + '%';
    document.getElementById('qbody').innerHTML = `<div class="ai-loading show">Generating Question ${state.qIdx}...</div>`;

    try {
        const q = await fetchAI();
        renderQ(q);
    } catch (e) {
        console.warn("AI logic failed, reverting to internal bank:", e);
        renderQ(FALLBACK[Math.floor(Math.random()*FALLBACK.length)]);
    }
}

async function fetchAI() {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${window.GEMINI_API_KEY}`;
    
    const prompt = `Generate a Year 5 Science question about ${state.domain}. 
    Return ONLY JSON with this structure: {"d": "Topic Name", "q": "The Question", "o": ["Option A", "Option B", "Option C", "Option D"], "a": 0, "e": "Short Explanation"}. 
    The 'a' value must be the index (0-3) of the correct answer.`;

    const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });

    if (!resp.ok) throw new Error("API Status: " + resp.status);

    const data = await resp.json();
    let rawText = data.candidates[0].content.parts[0].text;
    rawText = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
    return JSON.parse(rawText);
}

function renderQ(q) {
    state.currentQ = q;
    document.getElementById('qbody').innerHTML = `
        <div class="dom-badge">${q.d}</div>
        <div class="q-text">${q.q}</div>
        <div class="opts">
            ${q.o.map((opt, i) => `<div class="opt" onclick="check(${i})"><b>${String.fromCharCode(65+i)}</b> ${opt}</div>`).join('')}
        </div>
        <div id="fb" class="fb"></div>
        <button id="next-btn" onclick="loadNextQuestion()" style="display:none; margin-top:20px; width:100%; padding:12px; border-radius:12px; background:#1a1a4e; color:white; border:none; cursor:pointer; font-weight:bold">Next Question ➔</button>
    `;
}

function check(idx) {
    if(state.locked) return;
    state.locked = true;
    const isCorrect = idx === state.currentQ.a;
    if(isCorrect) state.score++;

    const opts = document.querySelectorAll('.opt');
    opts[idx].classList.add(isCorrect ? 'correct' : 'wrong');
    opts[state.currentQ.a].classList.add('correct');

    const fb = document.getElementById('fb');
    fb.innerHTML = `<b>${isCorrect ? 'Correct!' : 'Incorrect.'}</b> ${state.currentQ.e}`;
    fb.className = "fb show";
    fb.style.background = isCorrect ? '#f0fdf4' : '#fef2f2';
    document.getElementById('next-btn').style.display = 'block';
}

function finishQuiz() {
    document.getElementById('s-quiz').classList.remove('active');
    document.getElementById('s-results').classList.add('active');
    document.getElementById('res-name').innerText = state.name + " (" + state.cl + ")";
    document.getElementById('res-score').innerText = `${state.score} / ${state.qIdx}`;
}
</script>
</body>
</html>
