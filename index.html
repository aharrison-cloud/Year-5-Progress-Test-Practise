<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year 5 Science - NLCS Jeju</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #1a1a4e; --s: #f0f4ff; --w: #ffffff; --b: #dde2f0; --r: 12px;
        }
        body {
            font-family: 'Nunito', sans-serif; background: #0f0c29; color: #1a1a2e; margin: 0;
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .screen { display: none; width: 100%; height: 100vh; align-items: center; justify-content: center; position: fixed; }
        .active { display: flex; }
        .card { 
            background: var(--w); padding: 2.5rem; border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 90%; max-width: 420px; text-align: center; 
        }
        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid var(--b); 
            border-radius: var(--r); font-size: 16px; box-sizing: border-box; 
        }
        button { 
            background: var(--p); color: white; border: none; padding: 15px; 
            border-radius: var(--r); font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; 
        }
        #quiz-screen { background: var(--s); }
        .q-container { background: white; padding: 2rem; border-radius: 24px; width: 90%; max-width: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .opt { border: 2px solid var(--b); padding: 15px; border-radius: var(--r); margin: 10px 0; cursor: pointer; text-align: left; transition: 0.2s; font-weight: 600; }
        .opt:hover { background: #f8faff; border-color: var(--p); }
        .correct { border-color: #22c55e !important; background: #dcfce7 !important; color: #166534; }
        .wrong { border-color: #ef4444 !important; background: #fee2e2 !important; color: #991b1b; }
        #feedback { margin-top: 15px; padding: 15px; border-radius: 12px; display: none; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="card">
            <h1 style="margin:0; font-size: 26px;">🚀 Science Practice</h1>
            <p style="color: #666; margin-bottom: 20px;">NLCS Jeju Year 5</p>
            <input type="text" id="u-name" placeholder="Enter Your Name">
            <select id="u-class">
                <option value="">Select Class</option>
                <option>5A</option><option>5B</option><option>5C</option><option>5D</option><option>5E</option>
            </select>
            <button onclick="startApp()">Start Learning</button>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="q-container" id="q-box">
            <h3 id="status-text">AI is generating a question...</h3>
        </div>
    </div>

<script>

        const name = document.getElementById('u-name').value;

        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        fetchNext();
    }
