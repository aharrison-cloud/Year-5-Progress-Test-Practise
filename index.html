<script>
    const KEY = 'AIzaSyDFT2a5BMzlpRNKOEIKtsMHK2vu8P6KYAU'; 

    function launch() {
        const name = document.getElementById('u-name').value;
        const cls = document.getElementById('u-class').value;
        if(!name || !cls) return alert("Please enter your name and class!");

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        getNext();
    }

    async function getNext() {
        const box = document.getElementById('q-box');
        box.innerHTML = "<h3>Generating new question...</h3>";

        try {
            // Using v1 for stability
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ 
                            text: "Generate one Year 5 Science multiple choice question. Return the response as a raw JSON object with this exact structure: {\"q\":\"question text\",\"o\":[\"option1\",\"option2\",\"option3\",\"option4\"],\"a\":0,\"e\":\"explanation\"}. Do not include markdown formatting like ```json." 
                        }] 
                    }],
                    generationConfig: { 
                        temperature: 0.7 
                    }
                })
            });

            if(!response.ok) {
                const data = await response.json();
                throw new Error(data.error.message || "Unknown Error");
            }

            const result = await response.json();
            let rawText = result.candidates[0].content.parts[0].text;
            
            // Clean the text just in case the AI adds markdown back in
            rawText = rawText.replace(/```json|```/g, "").trim();
            
            const qData = JSON.parse(rawText);
            
            box.innerHTML = `
                <h2 style="margin-top:0">${qData.q}</h2>
                <div id="opts-list">
                    ${qData.o.map((choice, i) => `
                        <div class="opt" onclick="verify(${i}, ${qData.a}, this, '${qData.e.replace(/'/g, "\\'")}')">
                            ${choice}
                        </div>
                    `).join('')}
                </div>
                <div id="fb-area" style="display:none; margin-top:20px; padding:15px; border-radius:12px; font-weight:700;"></div>
                <button id="next-btn" style="display:none; margin-top:20px;" onclick="getNext()">Next Question ➔</button>
            `;
        } catch (err) {
            box.innerHTML = `
                <h3 style="color:#e11d48">System Error</h3>
                <div class="err-msg"><strong>Message:</strong> ${err.message}</div>
                <button style="margin-top:15px;" onclick="getNext()">Try Again</button>
            `;
        }
    }

    function verify(selected, correct, element, info) {
        const allOpts = document.querySelectorAll('.opt');
        allOpts.forEach(o => o.style.pointerEvents = 'none');
        
        const fb = document.getElementById('fb-area');
        fb.style.display = 'block';

        if(selected === correct) {
            element.classList.add('correct');
            fb.style.background = "#dcfce7";
            fb.style.color = "#166534";
            fb.innerHTML = "✅ Correct! " + info;
        } else {
            element.classList.add('wrong');
            allOpts[correct].classList.add('correct');
            fb.style.background = "#fee2e2";
            fb.style.color = "#991b1b";
            fb.innerHTML = "❌ Not quite. " + info;
        }
        
        document.getElementById('next-btn').style.display = 'block';
    }
</script>
