<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year 5 Science - NLCS Jeju</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p:#1a1a4e; --s:#f0f4ff; --w:#ffffff; --b:#dde2f0; --r:12px; }
        body { font-family: 'Nunito', sans-serif; background: #0f0c29; color: #1a1a2e; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: var(--w); padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 90%; max-width: 420px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid var(--b); border-radius: var(--r); font-size: 16px; box-sizing: border-box; }
        button { background: var(--p); color: white; border: none; padding: 15px; border-radius: var(--r); font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: scale(0.98); }
        #quiz-screen { display: none; width: 90%; max-width: 600px; background: var(--s); padding: 2rem; border-radius: 24px; }
        .q-box { background: white; padding: 2rem; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .opt { border: 2px solid var(--b); padding: 15px; border-radius: var(--r); margin: 10px 0; cursor: pointer; text-align: left; font-weight: 600; background: white; transition: 0.2s; }
        .opt:hover { border-color: var(--p); background: #f8faff; }
        .correct { border-color: #22c55e !important; background: #dcfce7 !important; color: #166534; }
        .wrong { border-color: #ef4444 !important; background: #fee2e2 !important; color: #991b1b; }
        #feedback { margin-top: 15px; padding: 15px; border-radius: 12px; display: none; font-weight: 700; line-height: 1.4; }
        #loading { font-weight: bold; color: var(--p); margin: 20px 0; }
        .err-msg { color: #be123c; background: #fff1f2; padding: 15px; border-radius: 12px; border: 1px solid #fecdd3; }
    </style>
</head>
<body>

    <!-- SCREEN 1: LOGIN -->
    <div id="login-screen" class="card">
        <h1 style="margin:0; font-size: 26px;">🚀 Year 5 Science</h1>
        <p style="color: #666; margin-bottom: 20px;">NLCS Jeju Practice</p>
        <input type="text" id="u-name" placeholder="Enter Full Name">
        <select id="u-class">
            <option value="">Select Class</option>
            <option>5A</option><option>5B</option><option>5C</option><option>5D</option><option>5E</option>
        </select>
        <button onclick="startApp()">Start Learning</button>
    </div>

    <!-- SCREEN 2: QUIZ -->
    <div id="quiz-screen">
        <div class="q-box" id="q-content">
            <div id="loading">Initializing AI...</div>
        </div>
    </div>

<script>
    const KEY = 'AIzaSyDFT2a5BMzlpRNKOEIKtsMHK2vu8P6KYAU'; 

    function startApp() {
        const name = document.getElementById('u-name').value;
        const cls = document.getElementById('u-class').value;
        if(!name || !cls) return alert("Please enter your name and class!");
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        fetchQuestion();
    }

    async function fetchQuestion() {
        const container = document.getElementById('q-content');
        container.innerHTML = `<div id="loading">AI is generating a Science question...</div>`;

        // We will try these model names in order. If one 404s, we try the next.
        const models = ['gemini-1.5-flash', 'gemini-1.5-flash-latest'];
        let success = false;

        for (const model of models) {
            if (success) break;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ 
                                text: "Act as a Year 5 Science teacher. Generate one multiple choice question. Return ONLY this format:\nQUESTION: [Text]\nA) [Opt]\nB) [Opt]\nC) [Opt]\nD) [Opt]\nANSWER: [Letter]\nEXPLANATION: [Text]" 
                            }] 
                        }]
                    })
                });

                if (response.status === 404) continue; // Try the next model name
                if (!response.ok) throw new Error(`API Error: ${response.status}`);

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                
                parseAndDisplay(text, container);
                success = true;

            } catch (err) {
                if (model === models[models.length - 1]) {
                    container.innerHTML = `
                        <div class="err-msg">
                            <h3>Connection Failed</h3>
                            <p>${err.message}</p>
                            <button onclick="fetchQuestion()">Retry Connection</button>
                        </div>`;
                }
            }
        }
    }

    function parseAndDisplay(text, container) {
        const lines = text.split('\n').filter(l => l.trim() !== "");
        const qText = lines.find(l => l.toUpperCase().includes('QUESTION:'))?.split(':').slice(1).join(':').trim() || "Science Question";
        const optA = lines.find(l => l.startsWith('A)'))?.replace('A)', '').trim();
        const optB = lines.find(l => l.startsWith('B)'))?.replace('B)', '').trim();
        const optC = lines.find(l => l.startsWith('C)'))?.replace('C)', '').trim();
        const optD = lines.find(l => l.startsWith('D)'))?.replace('D)', '').trim();
        const answerChar = lines.find(l => l.toUpperCase().includes('ANSWER:'))?.split(':').slice(1).join(':').trim().toUpperCase().charAt(0);
        const explain = lines.find(l => l.toUpperCase().includes('EXPLANATION:'))?.split(':').slice(1).join(':').trim() || "Well done!";

        const charToIndex = { 'A': 0, 'B': 1, 'C': 2, 'D': 3 };
        const correctIndex = charToIndex[answerChar] ?? 0;

        container.innerHTML = `
            <h2 style="margin-top:0; font-size:20px;">${qText}</h2>
            <div id="options-list">
                <div class="opt" onclick="verify(0, ${correctIndex}, this, '${explain.replace(/'/g, "\\'")}')">${optA}</div>
                <div class="opt" onclick="verify(1, ${correctIndex}, this, '${explain.replace(/'/g, "\\'")}')">${optB}</div>
                <div class="opt" onclick="verify(2, ${correctIndex}, this, '${explain.replace(/'/g, "\\'")}')">${optC}</div>
                <div class="opt" onclick="verify(3, ${correctIndex}, this, '${explain.replace(/'/g, "\\'")}')">${optD}</div>
            </div>
            <div id="feedback"></div>
            <button id="next-btn" style="display:none; margin-top:20px" onclick="fetchQuestion()">Next Question ➔</button>
        `;
    }

    function verify(selected, correct, el, info) {
        const allOpts = document.querySelectorAll('.opt');
        allOpts.forEach(o => o.style.pointerEvents = 'none');
        
        const fb = document.getElementById('feedback');
        fb.style.display = 'block';

        if(selected === correct) {
            el.classList.add('correct');
            fb.style.background = "#dcfce7";
            fb.style.color = "#166534";
            fb.innerHTML = "✅ Correct! " + info;
        } else {
            el.classList.add('wrong');
            allOpts[correct].classList.add('correct');
            fb.style.background = "#fee2e2";
            fb.style.color = "#991b1b";
            fb.innerHTML = "❌ Not quite. " + info;
        }
        document.getElementById('next-btn').style.display = 'block';
    }
</script>
</body>
</html>
